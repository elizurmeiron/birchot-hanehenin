<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ברכות הנהנין - מדריך הלכתי מקיף</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=David+Libre:wght@400;500;700&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="gold" data-mode="light">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <h2>🕎 ברכות הנהנין</h2>

            <div class="sidebar-controls">
                <h3>מצב תצוגה</h3>
                <div class="mode-toggle">
                    <button class="mode-btn active" data-mode="light" onclick="setMode('light')">בהיר</button>
                    <button class="mode-btn" data-mode="dark" onclick="setMode('dark')">כהה</button>
                </div>
                <h3>ערכת צבעים</h3>
                <select class="theme-select" onchange="setTheme(this.value)">
                    <option value="gold">זהוב</option>
                    <option value="blue">כחול</option>
                    <option value="green">ירוק</option>
                    <option value="rose">ורוד</option>
                    <option value="gray">אפור</option>
                </select>
            </div>

            <nav id="menu-nav"></nav>
        </aside>

        <main class="main-content" id="slides-container"></main>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" id="prev-btn" onclick="prevSlide()">→ הקודם</button>
        <div class="nav-progress">
            <span id="nav-text"></span>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
        <button class="nav-btn" id="next-btn" onclick="nextSlide()">הבא ←</button>
    </div>

<!-- נתוני השקפים -->
<script src="slides.js"></script>
<!-- לוגיקת תצוגה, ניווט וחידון -->
<script src="script.js"></script>
</body>
</html>
